<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>くだものキャッチ</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Hiragino Maru Gothic Pro', 'Rounded Mplus 1c', sans-serif; overflow: hidden; background: #87CEEB; }
#game-wrap { width: 100vw; height: 100vh; max-width: 480px; margin: 0 auto; position: relative; overflow: hidden; }
canvas { position: absolute; inset: 0; width: 100%; height: 100%; touch-action: none; }

#hud { position: absolute; top: 0; left: 0; right: 0; display: flex; justify-content: space-between; align-items: center; padding: 10px 14px 8px; z-index: 10; background: rgba(100,180,100,0.75); }
.hud-box { background: rgba(255,255,255,0.93); border-radius: 12px; padding: 4px 13px; text-align: center; min-width: 70px; }
.hud-label { font-size: 10px; color: #2e7d32; font-weight: 700; }
.hud-val   { font-size: 22px; font-weight: 900; color: #1b5e20; }
#hud-title { font-size: 16px; font-weight: 900; color: #fff; text-shadow: 1px 2px 0 #2e7d32; }

.screen { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 20; }
#title-screen { background: linear-gradient(180deg,#66bb6a,#a5d6a7); }
#title-screen h1 { font-size: 28px; font-weight: 900; color: #fff; text-shadow: 2px 2px 0 #2e7d32; margin-bottom: 6px; }
#title-screen p  { font-size: 13px; color: #e8f5e9; margin-bottom: 6px; text-align: center; line-height: 1.7; }
.warn-box { background: rgba(255,80,80,0.82); color: #fff; font-size: 13px; font-weight: 700; padding: 8px 18px; border-radius: 14px; margin-bottom: 16px; text-align: center; line-height: 1.6; }

.chara-select { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-bottom: 18px; width: 300px; }
.chara-btn { background: #fff; border: 4px solid transparent; border-radius: 18px; padding: 12px 8px 8px; cursor: pointer; transition: transform 0.1s; text-align: center; font-size: 11px; font-weight: 700; color: #555; touch-action: manipulation; }
.chara-btn .ci { font-size: 38px; display: block; margin-bottom: 4px; line-height: 1; }
.chara-btn:hover { transform: scale(1.07); }
.chara-btn.selected { border-color: #66bb6a; background: #f1f8e9; transform: scale(1.1); box-shadow: 0 0 0 3px #43a047; }

.hi-badge { background: rgba(255,255,255,0.2); color: #FFD700; font-size: 13px; font-weight: 700; padding: 4px 16px; border-radius: 20px; margin-bottom: 14px; }
.big-btn { background: #FF6B35; color: #fff; border: none; border-radius: 50px; padding: 13px 40px; font-size: 19px; font-weight: 700; cursor: pointer; box-shadow: 0 6px 0 #c94d1e; touch-action: manipulation; }
.big-btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #c94d1e; }
.big-btn.blue { background: #4DB8FF; box-shadow: 0 6px 0 #2a9ad4; }
.big-btn.blue:active { box-shadow: 0 2px 0 #2a9ad4; }

#result-overlay { position: absolute; inset: 0; z-index: 30; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(60,140,60,0.88); }
#result-overlay h2 { font-size: 46px; font-weight: 900; color: #FFD700; text-shadow: 3px 3px 0 #1b5e20; margin-bottom: 8px; }
#result-overlay p  { font-size: 16px; color: #fff; text-align: center; line-height: 1.8; margin-bottom: 6px; }
.new-hi { font-size: 20px; color: #FFD700; font-weight: 900; }

.pop-label { position: absolute; font-weight: 900; pointer-events: none; animation: popUp 0.7s forwards; z-index: 25; white-space: nowrap; }
@keyframes popUp { 0%{opacity:1;transform:translateY(0) scale(1)} 100%{opacity:0;transform:translateY(-60px) scale(1.4)} }
</style>
</head>
<body>
<div id="game-wrap">

  <!-- タイトル -->
  <div id="title-screen" class="screen">
    <div style="font-size:56px;margin-bottom:6px;">🍎</div>
    <h1>くだものキャッチ！</h1>
    <p>おちてくる くだものを<br>うけとめよう！</p>
    <div class="warn-box">⚠️ どうぶつが おちてくるよ！<br>どうぶつは よけてね！</div>
    <p style="color:#e8f5e9;font-size:12px;margin-bottom:10px;">キャラをえらんでね</p>
    <div class="chara-select">
      <button class="chara-btn" data-e="🐱" data-n="ねこ" onclick="selChara(this)"><span class="ci">🐱</span>ねこ</button>
      <button class="chara-btn" data-e="🐰" data-n="うさぎ" onclick="selChara(this)"><span class="ci">🐰</span>うさぎ</button>
      <button class="chara-btn" data-e="🐸" data-n="かえる" onclick="selChara(this)"><span class="ci">🐸</span>かえる</button>
      <button class="chara-btn" data-e="🐼" data-n="パンダ" onclick="selChara(this)"><span class="ci">🐼</span>パンダ</button>
      <button class="chara-btn" data-e="🦊" data-n="きつね" onclick="selChara(this)"><span class="ci">🦊</span>きつね</button>
      <button class="chara-btn" data-e="🐧" data-n="ペンギン" onclick="selChara(this)"><span class="ci">🐧</span>ペンギン</button>
    </div>
    <div id="hi-title" class="hi-badge">🏆 ハイスコア: 0てん</div>
    <button class="big-btn" id="start-btn" style="opacity:0.4;pointer-events:none;" onclick="startGame()">▶ スタート！</button>
  </div>

  <!-- HUD -->
  <div id="hud" style="display:none;">
    <div class="hud-box"><div class="hud-label">スコア</div><div class="hud-val" id="score-disp">0</div></div>
    <div id="hud-title">🍎 くだものキャッチ</div>
    <div class="hud-box"><div class="hud-label">のこり</div><div class="hud-val" id="time-disp">30</div></div>
  </div>

  <canvas id="c"></canvas>

  <!-- 結果 -->
  <div id="result-overlay" style="display:none;">
    <h2 id="r-title">🎉</h2>
    <p id="r-msg"></p>
    <div id="r-hi" class="hi-badge" style="margin-bottom:18px;"></div>
    <div style="display:flex;gap:10px;">
      <button class="big-btn" onclick="startGame()">もういちど</button>
      <button class="big-btn blue" onclick="goTitle()">タイトルへ</button>
    </div>
  </div>

</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const wrap = document.getElementById('game-wrap');
let W, H;

// キャラ
let chara = null;
// キャッチャー
let catcher = { x: 0.5, w: 0, emoji: '🐱' };
// ゲーム状態
let items = [], score = 0, timeLeft = 30, running = false;
let animId, timerInt, spawnTimeout;
// ミス（動物キャッチ）でHP
let hp = 3;

const FRUITS = ['🍎','🍊','🍋','🍇','🍓','🍑','🍒','🍌','🍉','🍈','🥝','🫐'];
const TRAPS  = ['🐶','🦁','🐮','🐷','🦝','🐨','🐯','🐺','🦄','🐔'];
const FRUIT_PTS = { '🍎':1,'🍊':1,'🍋':2,'🍇':2,'🍓':3,'🍑':2,'🍒':3,'🍌':1,'🍉':2,'🍈':1,'🥝':3,'🫐':3 };

// ギャラリー
let gallery = [];
const GALLERY = ['👸','🤴','👑','🦋','🐝','🌸','⭐','🎉','🌈','🎀'];

function getHi(){ return parseInt(localStorage.getItem('kudamono_hi')||'0'); }
function saveHi(v){ localStorage.setItem('kudamono_hi', v); }
function updateHiBadge(){ document.getElementById('hi-title').textContent='🏆 ハイスコア: '+getHi()+'てん'; }

function resize(){
  W=wrap.clientWidth; H=wrap.clientHeight;
  canvas.width=W; canvas.height=H;
  catcher.w = W*0.22;
  buildGallery();
}

function buildGallery(){
  gallery=[];
  const left  = ['🦁','🐨','🦝','🐮','🐷','🦋','🐝'];
  const right  = ['👸','🤴','👑','🎉','⭐','🌈','🌸'];
  for(let i=0;i<6;i++){
    gallery.push({emoji:left[i%left.length],   x:W*0.03+(i%2)*W*0.07, y:H*0.15+i*H*0.1, size:W*0.07, phase:i*1.1, speed:1.4+i*0.2});
    gallery.push({emoji:right[i%right.length], x:W*0.97-(i%2)*W*0.07, y:H*0.15+i*H*0.1, size:W*0.07, phase:i*1.3, speed:1.6+i*0.2});
  }
  // 上部
  ['👸','🤴','👑','🎀','🌈'].forEach((e,i)=>
    gallery.push({emoji:e, x:W*(0.12+i*0.19), y:H*0.05, size:W*0.07, phase:i*0.8, speed:2})
  );
  // 下部
  ['🦁','🐘','🦊','🐸','🐧','🐨'].forEach((e,i)=>
    gallery.push({emoji:e, x:W*(0.08+i*0.17), y:H*0.95, size:W*0.065, phase:i*0.6, speed:1.7})
  );
}

function selChara(btn){
  document.querySelectorAll('.chara-btn').forEach(b=>b.classList.remove('selected'));
  btn.classList.add('selected');
  chara={emoji:btn.dataset.e, name:btn.dataset.n};
  catcher.emoji=chara.emoji;
  const sb=document.getElementById('start-btn');
  sb.style.opacity='1'; sb.style.pointerEvents='auto';
}

function startGame(){
  if(!chara) return;
  score=0; timeLeft=30; running=true; hp=3; items=[];
  catcher.x=0.5;
  document.getElementById('title-screen').style.display='none';
  document.getElementById('result-overlay').style.display='none';
  document.getElementById('hud').style.display='flex';
  document.getElementById('score-disp').textContent='0';
  document.getElementById('time-disp').textContent='30';
  clearInterval(timerInt); clearTimeout(spawnTimeout); cancelAnimationFrame(animId);
  loop(); spawnLoop();
  timerInt=setInterval(()=>{ timeLeft--; document.getElementById('time-disp').textContent=timeLeft; if(timeLeft<=0) endGame(); },1000);
}

function goTitle(){
  running=false; cancelAnimationFrame(animId); clearInterval(timerInt); clearTimeout(spawnTimeout);
  document.getElementById('result-overlay').style.display='none';
  document.getElementById('hud').style.display='none';
  document.getElementById('title-screen').style.display='flex';
  updateHiBadge();
}

// ===== スポーン =====
function spawnLoop(){
  if(!running) return;
  const isTrap = Math.random() < 0.22;
  const emoji  = isTrap ? TRAPS[Math.floor(Math.random()*TRAPS.length)] : FRUITS[Math.floor(Math.random()*FRUITS.length)];
  const size   = (18 + Math.random()*22) * (W/400);
  items.push({
    emoji, isTrap, size,
    x: size + Math.random()*(W-size*2),
    y: -size,
    vy: (2.5+Math.random()*2.5) * (H/700),
    vx: (Math.random()-0.5)*(W*0.003),
    alive: true, caught: false, catchT: 0,
    missed: false, missT: 0,
  });
  spawnTimeout = setTimeout(spawnLoop, 500+Math.random()*800);
}

// ===== 操作 =====
let dragging=false, dragStartX=0, catcherStartX=0;

canvas.addEventListener('touchstart', e=>{
  e.preventDefault();
  const r=canvas.getBoundingClientRect();
  const tx=(e.touches[0].clientX-r.left)*(W/r.width);
  dragging=true; dragStartX=tx; catcherStartX=catcher.x*W;
},{passive:false});
canvas.addEventListener('touchmove', e=>{
  e.preventDefault();
  if(!dragging) return;
  const r=canvas.getBoundingClientRect();
  const tx=(e.touches[0].clientX-r.left)*(W/r.width);
  const dx=tx-dragStartX;
  catcher.x=Math.max(0.08,Math.min(0.92,(catcherStartX+dx)/W));
},{passive:false});
canvas.addEventListener('touchend',()=>dragging=false);
canvas.addEventListener('mousemove', e=>{
  const r=canvas.getBoundingClientRect();
  catcher.x=(e.clientX-r.left)*(W/r.width)/W;
  catcher.x=Math.max(0.08,Math.min(0.92,catcher.x));
});

// ===== ループ =====
function loop(){ if(!running) return; update(); draw(); animId=requestAnimationFrame(loop); }

function update(){
  const cx=catcher.x*W, cy=H*0.88;
  const hw=catcher.w*0.5;

  items.forEach(item=>{
    if(!item.alive) return;
    if(item.caught){ item.catchT+=0.12; if(item.catchT>1) item.alive=false; return; }
    if(item.missed){ item.missT+=0.1; if(item.missT>1) item.alive=false; return; }

    item.x+=item.vx; item.y+=item.vy;

    // 壁バウンド
    if(item.x<item.size){item.x=item.size; item.vx=Math.abs(item.vx);}
    if(item.x>W-item.size){item.x=W-item.size; item.vx=-Math.abs(item.vx);}

    // キャッチ判定
    if(item.y+item.size > cy-item.size*0.5 && item.y < cy+item.size &&
       item.x > cx-hw-item.size*0.5 && item.x < cx+hw+item.size*0.5){
      item.caught=true;
      if(item.isTrap){
        hp=Math.max(0,hp-1);
        showPop(item.x,cy,'💥 -HP','#ff4444',22);
        if(hp<=0){ setTimeout(endGame,600); return; }
      } else {
        const pts=FRUIT_PTS[item.emoji]||1;
        score+=pts;
        document.getElementById('score-disp').textContent=score;
        showPop(item.x,cy,(pts>=3?'🌟':pts>=2?'✨':'')+'  +'+pts,'#FFD700',pts>=3?24:18);
      }
      return;
    }

    // 落下ミス（くだものだけ減点なし、ただし床まで落ちたら消える）
    if(item.y > H+item.size) item.alive=false;
  });

  items=items.filter(i=>i.alive);
}

// ===== 描画 =====
function draw(){
  // 背景
  ctx.fillStyle='#87CEEB'; ctx.fillRect(0,0,W,H);
  // 草地
  ctx.fillStyle='#66bb6a'; ctx.fillRect(0,H*0.9,W,H*0.1);
  ctx.fillStyle='#81c784'; ctx.fillRect(0,H*0.9,W,H*0.03);
  // 雲
  drawClouds();
  // ギャラリー
  drawGallery();
  // ガイドライン（キャッチャーエリア）
  ctx.strokeStyle='rgba(255,255,255,0.15)'; ctx.lineWidth=1;
  ctx.setLineDash([6,6]);
  ctx.beginPath(); ctx.moveTo(0,H*0.88); ctx.lineTo(W,H*0.88); ctx.stroke();
  ctx.setLineDash([]);
  // アイテム
  items.forEach(drawItem);
  // キャッチャー
  drawCatcher();
  // HP
  drawHP();
}

function drawClouds(){
  ctx.fillStyle='rgba(255,255,255,0.6)';
  [[W*0.12,H*0.1,55],[W*0.7,H*0.08,44],[W*0.42,H*0.06,36]].forEach(([cx,cy,r])=>{
    ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx+r*0.6,cy+5,r*0.7,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx-r*0.55,cy+6,r*0.6,0,Math.PI*2); ctx.fill();
  });
}

function drawGallery(){
  const t=performance.now()/1000;
  gallery.forEach(g=>{
    const bob=Math.sin(t*g.speed+g.phase)*5;
    ctx.font=`${Math.round(g.size)}px serif`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(g.emoji,g.x,g.y+bob);
  });
}

function drawItem(item){
  if(!item.alive) return;
  ctx.save();
  if(item.caught){
    ctx.globalAlpha=1-item.catchT;
    ctx.translate(item.x, item.y - item.catchT*30);
    ctx.scale(1+item.catchT*0.5,1+item.catchT*0.5);
  } else if(item.missed){
    ctx.globalAlpha=1-item.missT;
    ctx.translate(item.x, item.y+item.missT*20);
  } else {
    ctx.translate(item.x, item.y);
    // 動物トラップ：ちょっと揺らす
    if(item.isTrap) ctx.rotate(Math.sin(performance.now()/200)*0.18);
  }
  ctx.font=`${Math.round(item.size*2)}px serif`;
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(item.emoji,0,0);

  // トラップに✕
  if(item.isTrap && !item.caught){
    ctx.strokeStyle='rgba(255,50,50,0.55)'; ctx.lineWidth=2.5;
    const s=item.size*0.8;
    ctx.beginPath(); ctx.moveTo(-s,-s); ctx.lineTo(s,s); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(s,-s); ctx.lineTo(-s,s); ctx.stroke();
  }
  ctx.restore();
}

function drawCatcher(){
  const cx=catcher.x*W, cy=H*0.88;
  const hw=catcher.w*0.5;
  // バスケット
  ctx.save();
  ctx.fillStyle='rgba(255,200,80,0.85)';
  ctx.strokeStyle='#e65100'; ctx.lineWidth=3;
  // 楕円バスケット
  ctx.beginPath();
  ctx.ellipse(cx,cy,hw,hw*0.35,0,0,Math.PI*2);
  ctx.fill(); ctx.stroke();
  // 網模様
  ctx.strokeStyle='rgba(200,100,0,0.3)'; ctx.lineWidth=1.5;
  for(let i=-2;i<=2;i++){
    ctx.beginPath(); ctx.moveTo(cx+i*hw*0.4,cy-hw*0.3); ctx.lineTo(cx+i*hw*0.4+hw*0.1,cy+hw*0.3); ctx.stroke();
  }
  ctx.beginPath(); ctx.ellipse(cx,cy,hw*0.85,hw*0.22,0,0,Math.PI*2);
  ctx.stroke();
  ctx.restore();
  // キャラ
  ctx.font=`${Math.round(W*0.11)}px serif`;
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(catcher.emoji, cx, cy-hw*0.7);
}

function drawHP(){
  const t=performance.now()/1000;
  ctx.font=`${Math.round(W*0.055)}px serif`;
  ctx.textAlign='left'; ctx.textBaseline='top';
  let hstr='';
  for(let i=0;i<3;i++) hstr+=(i<hp?'❤️':'🖤');
  ctx.fillText(hstr, W*0.02, H*0.075);
}

function showPop(x,y,text,color,size){
  const el=document.createElement('div');
  el.className='pop-label'; el.textContent=text;
  el.style.color=color; el.style.fontSize=size+'px';
  el.style.left=(x-50)+'px'; el.style.top=(y-40)+'px';
  wrap.appendChild(el);
  setTimeout(()=>el.remove(),800);
}

function endGame(){
  running=false; clearInterval(timerInt); clearTimeout(spawnTimeout); cancelAnimationFrame(animId);
  const hi=getHi(); const isNew=score>hi;
  if(isNew) saveHi(score);
  updateHiBadge();
  document.getElementById('hud').style.display='none';
  document.getElementById('result-overlay').style.display='flex';
  const hiEl=document.getElementById('r-hi');
  hiEl.textContent=isNew?'🏆 ニューレコード！':'ハイスコア: '+hi+'てん';
  hiEl.style.color=isNew?'#FFD700':'#ccc';
  const t=document.getElementById('r-title'), m=document.getElementById('r-msg');
  const reason = hp<=0 ? '<br><span style="font-size:13px;color:#ffcccc;">どうぶつをキャッチしちゃった…</span>' : '';
  if(score>=30)     {t.textContent='🏆 すごい！';  m.innerHTML=`スコア <b style="font-size:28px;color:#FFD700">${score}</b> てん！<br>くだものキャッチ チャンピオン！${reason}`;}
  else if(score>=15){t.textContent='⭐ ナイス！';  m.innerHTML=`スコア <b style="font-size:28px;color:#FFD700">${score}</b> てん！<br>よくできました！${reason}`;}
  else              {t.textContent='🍎 もういちど';m.innerHTML=`スコア <b style="font-size:28px;color:#FFD700">${score}</b> てん<br>またちょうせん！${reason}`;}
}

resize();
updateHiBadge();
window.addEventListener('resize',()=>resize());
</script>
</body>
</html>
