<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>わくわくアイランド</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Hiragino Maru Gothic Pro', 'Rounded Mplus 1c', sans-serif; background: #87CEEB; }
.wi-wrap { background: #87CEEB; min-height: 100vh; overflow: hidden; position: relative; }
.wi-sky { background: #87CEEB; padding: 20px 20px 0; position: relative; min-height: 230px; }
.wi-title-area { text-align: center; position: relative; z-index: 2; padding-bottom: 16px; }
.wi-logo-badge { display: inline-block; background: #FF6B35; color: #fff; font-size: 12px; font-weight: 700; padding: 4px 14px; border-radius: 20px; margin-bottom: 8px; letter-spacing: 0.08em; box-shadow: 0 3px 0 #c94d1e; }
.wi-title { font-size: 52px; font-weight: 900; line-height: 1; margin-bottom: 4px; display: block; }
.wi-title span { display: block; }
.t1 { color: #FF6B35; text-shadow: 3px 3px 0 #fff, 5px 5px 0 #ffb347; }
.t2 { color: #fff; text-shadow: 3px 3px 0 #5ba3d9, 5px 5px 0 #3a7fb5; font-size: 40px; }
.wi-sub { font-size: 13px; color: #fff; background: rgba(0,0,0,0.15); display: inline-block; padding: 4px 16px; border-radius: 20px; margin-top: 6px; }
.cloud { position: absolute; background: #fff; border-radius: 50px; opacity: 0.9; z-index: 1; }
.cloud::before, .cloud::after { content: ''; position: absolute; background: #fff; border-radius: 50%; }
.c1 { width: 80px; height: 28px; top: 18px; left: 16px; } .c1::before { width: 36px; height: 36px; top: -18px; left: 8px; } .c1::after { width: 26px; height: 26px; top: -12px; left: 34px; }
.c2 { width: 60px; height: 22px; top: 30px; right: 24px; } .c2::before { width: 28px; height: 28px; top: -14px; left: 6px; } .c2::after { width: 20px; height: 20px; top: -9px; left: 26px; }
.c3 { width: 50px; height: 18px; top: 8px; left: 38%; } .c3::before { width: 22px; height: 22px; top: -11px; left: 5px; } .c3::after { width: 16px; height: 16px; top: -7px; left: 20px; }
.chara { position: absolute; z-index: 3; text-align: center; pointer-events: none; }
@keyframes float  { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
@keyframes float2 { 0%,100%{transform:translateY(0) rotate(-3deg)} 50%{transform:translateY(-8px) rotate(3deg)} }
@keyframes float3 { 0%,100%{transform:translateY(0) scaleX(1)} 50%{transform:translateY(-5px) scaleX(-1)} }
@keyframes bounce { 0%,100%{transform:translateY(0)} 40%{transform:translateY(-10px)} 70%{transform:translateY(-4px)} }
@keyframes wiggle { 0%,100%{transform:rotate(-8deg)} 50%{transform:rotate(8deg)} }
@keyframes pulse  { 0%,100%{transform:scale(1)} 50%{transform:scale(1.12)} }
.wi-sea { background: #4DB8FF; padding: 0 16px 16px; position: relative; overflow: hidden; }
.wi-island { background: #F4D03F; border-radius: 50% 50% 40% 40%; height: 28px; margin: 0 auto; width: 92%; position: relative; top: -4px; box-shadow: 0 6px 0 #E6B800; }
.wi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 12px; max-width: 720px; margin: 0 auto; padding: 8px 0; position: relative; z-index: 2; }
.wi-card { border: none; border-radius: 20px; padding: 0; cursor: pointer; transition: transform 0.12s; overflow: hidden; background: #fff; text-align: center; position: relative; }
.wi-card:hover { transform: translateY(-6px) rotate(-1deg); }
.wi-card:active { transform: translateY(2px); }
.card-top { padding: 18px 12px 8px; position: relative; }
.card-icon { font-size: 48px; display: block; margin-bottom: 2px; line-height: 1.1; }
.card-num { position: absolute; top: 8px; right: 10px; width: 22px; height: 22px; border-radius: 50%; font-size: 11px; font-weight: 700; display: flex; align-items: center; justify-content: center; color: #fff; }
.card-bottom { padding: 8px 10px 14px; }
.card-name { font-size: 13px; font-weight: 700; color: #333; margin-bottom: 2px; }
.card-desc { font-size: 10px; color: #aaa; line-height: 1.4; }
.card-stars { font-size: 11px; margin-top: 4px; }
.g1 .card-top{background:#FFF0EB;} .g1 .card-num{background:#FF6B35;} .g1{box-shadow:0 6px 0 #FF6B35;}
.g2 .card-top{background:#EBF5FF;} .g2 .card-num{background:#4DB8FF;} .g2{box-shadow:0 6px 0 #4DB8FF;}
.g3 .card-top{background:#EEF0FF;} .g3 .card-num{background:#7B68EE;} .g3{box-shadow:0 6px 0 #7B68EE;}
.g4 .card-top{background:#EAFAF1;} .g4 .card-num{background:#2ECC71;} .g4{box-shadow:0 6px 0 #2ECC71;}
.g5 .card-top{background:#FFF8E7;} .g5 .card-num{background:#F4D03F;} .g5{box-shadow:0 6px 0 #D4AC0D;}
.g6 .card-top{background:#EAFFFE;} .g6 .card-num{background:#00BCD4;} .g6{box-shadow:0 6px 0 #0097A7;}
.new-badge { position: absolute; top: 8px; left: 8px; background: #FF3B5C; color: #fff; font-size: 9px; font-weight: 700; padding: 2px 7px; border-radius: 10px; letter-spacing: 0.05em; animation: pulse 1.6s infinite; }
.footer-charas { display: flex; justify-content: center; gap: 10px; padding: 10px 0 4px; flex-wrap: wrap; }
.wi-footer { text-align: center; padding: 8px 12px 20px; font-size: 12px; color: rgba(255,255,255,0.9); }
.wave { width: 100%; overflow: hidden; line-height: 0; margin-top: -2px; display: block; height: 32px; }
</style>
</head>
<body>
<div class="wi-wrap">

  <div class="wi-sky">
    <div class="cloud c1"></div>
    <div class="cloud c2"></div>
    <div class="cloud c3"></div>

    <!-- プリンセス 左 -->
    <div class="chara" style="left:8px;top:16px;animation:float 3s ease-in-out infinite;">
      <svg width="52" height="70" viewBox="0 0 52 74" overflow="visible">
        <ellipse cx="26" cy="62" rx="19" ry="11" fill="#FF80AB"/>
        <polygon points="26,30 8,66 44,66" fill="#FF4081"/>
        <rect x="20" y="27" width="12" height="16" rx="4" fill="#FFCCBC"/>
        <circle cx="26" cy="20" r="11" fill="#FFCCBC"/>
        <ellipse cx="26" cy="11" rx="11" ry="7" fill="#F9A825"/>
        <ellipse cx="15" cy="21" rx="5" ry="8" fill="#F9A825"/>
        <ellipse cx="37" cy="21" rx="5" ry="8" fill="#F9A825"/>
        <polygon points="16,9 21,3 26,8 31,3 36,9" fill="#FFD700" stroke="#FFA000" stroke-width="1"/>
        <circle cx="26" cy="8" r="2" fill="#FF1744"/>
        <circle cx="22" cy="20" r="2" fill="#5D4037"/>
        <circle cx="30" cy="20" r="2" fill="#5D4037"/>
        <circle cx="23" cy="19.5" r="0.8" fill="#fff"/>
        <circle cx="31" cy="19.5" r="0.8" fill="#fff"/>
        <path d="M22,24 Q26,27 30,24" stroke="#E91E63" stroke-width="1.5" fill="none" stroke-linecap="round"/>
        <ellipse cx="12" cy="37" rx="4" ry="7" fill="#FFCCBC" transform="rotate(-20,12,37)"/>
        <ellipse cx="40" cy="37" rx="4" ry="7" fill="#FFCCBC" transform="rotate(20,40,37)"/>
        <text x="-4" y="14" font-size="10">✨</text>
        <text x="42" y="10" font-size="9">⭐</text>
      </svg>
    </div>

    <!-- プリンス 右 -->
    <div class="chara" style="right:8px;top:12px;animation:float2 3.5s ease-in-out infinite;">
      <svg width="52" height="70" viewBox="0 0 52 72" overflow="visible">
        <rect x="13" y="46" width="10" height="18" rx="3" fill="#1565C0"/>
        <rect x="29" y="46" width="10" height="18" rx="3" fill="#1565C0"/>
        <rect x="11" y="28" width="30" height="22" rx="5" fill="#1976D2"/>
        <rect x="17" y="26" width="18" height="10" rx="3" fill="#FFCCBC"/>
        <circle cx="26" cy="19" r="11" fill="#FFCCBC"/>
        <ellipse cx="26" cy="10" rx="11" ry="7" fill="#5D4037"/>
        <polygon points="16,9 21,3 26,8 31,3 36,9" fill="#FFD700" stroke="#FFA000" stroke-width="1"/>
        <circle cx="26" cy="8" r="2" fill="#2196F3"/>
        <circle cx="22" cy="19" r="2" fill="#333"/>
        <circle cx="30" cy="19" r="2" fill="#333"/>
        <circle cx="23" cy="18.5" r="0.8" fill="#fff"/>
        <circle cx="31" cy="18.5" r="0.8" fill="#fff"/>
        <path d="M22,23 Q26,26 30,23" stroke="#BF8A7A" stroke-width="1.5" fill="none" stroke-linecap="round"/>
        <ellipse cx="6" cy="37" rx="5" ry="8" fill="#1976D2" transform="rotate(-15,6,37)"/>
        <ellipse cx="46" cy="37" rx="5" ry="8" fill="#1976D2" transform="rotate(15,46,37)"/>
        <rect x="47" y="24" width="3" height="22" rx="1" fill="#CFD8DC"/>
        <rect x="43" y="33" width="11" height="3" rx="1" fill="#FFA000"/>
        <text x="-2" y="14" font-size="9">⭐</text>
      </svg>
    </div>

    <!-- 小鳥 -->
    <div class="chara" style="left:72px;top:60px;animation:float3 2.4s ease-in-out infinite;font-size:26px;">🐦</div>
    <!-- 虹 -->
    <div class="chara" style="right:70px;top:50px;animation:float 4s ease-in-out infinite;font-size:30px;">🌈</div>
    <!-- 星デコ -->
    <div class="chara" style="left:44%;top:8px;font-size:18px;color:#FFD700;animation:wiggle 2s ease-in-out infinite;">★</div>
    <div class="chara" style="right:130px;top:22px;font-size:14px;color:#FF80AB;animation:wiggle 2.6s ease-in-out infinite;">★</div>
    <div class="chara" style="left:158px;top:18px;font-size:12px;color:#fff;animation:wiggle 3s ease-in-out infinite;">✦</div>

    <div class="wi-title-area">
      <div class="wi-logo-badge">🏝️ GAME PARK</div>
      <div class="wi-title">
        <span class="t1">わくわく</span>
        <span class="t2">アイランド</span>
      </div>
      <div class="wi-sub">🏝️ たのしい あそびじま！</div>
    </div>

    <svg class="wave" viewBox="0 0 400 32" preserveAspectRatio="none">
      <path d="M0,16 C60,32 120,0 180,16 C240,32 300,0 360,16 C390,24 400,20 400,20 L400,32 L0,32 Z" fill="#4DB8FF"/>
    </svg>
  </div>

  <div class="wi-sea">
    <!-- 海の生き物 -->
    <div style="position:absolute;top:14px;left:6px;font-size:22px;animation:float2 2.2s ease-in-out infinite;z-index:3;pointer-events:none;">🐠</div>
    <div style="position:absolute;top:22px;right:8px;font-size:20px;animation:wiggle 2.8s ease-in-out infinite;z-index:3;pointer-events:none;">🐟</div>
    <div style="position:absolute;top:10px;left:50%;margin-left:-160px;font-size:20px;animation:float 3.5s ease-in-out infinite;z-index:3;pointer-events:none;">🐢</div>
    <div style="position:absolute;top:6px;right:70px;font-size:22px;animation:float2 2.6s ease-in-out infinite;z-index:3;pointer-events:none;">🐬</div>

    <div class="wi-island"></div>

    <!-- 島まわりキャラ（ラベルなし） -->
    <div style="position:absolute;bottom:100px;left:2px;font-size:34px;z-index:5;animation:bounce 2.4s ease-in-out infinite;pointer-events:none;">🐱</div>
    <div style="position:absolute;bottom:98px;right:2px;font-size:34px;z-index:5;animation:float2 3s ease-in-out infinite;pointer-events:none;">🐻</div>
    <div style="position:absolute;bottom:84px;left:50%;transform:translateX(-320px);font-size:28px;z-index:5;animation:bounce 1.9s ease-in-out infinite;pointer-events:none;">🐰</div>
    <div style="position:absolute;bottom:84px;left:50%;transform:translateX(280px);font-size:28px;z-index:5;animation:float3 2.8s ease-in-out infinite;pointer-events:none;">🐼</div>
    <div style="position:absolute;bottom:74px;left:50%;transform:translateX(-260px);font-size:20px;z-index:4;pointer-events:none;">🌸</div>
    <div style="position:absolute;bottom:74px;left:50%;transform:translateX(244px);font-size:20px;z-index:4;pointer-events:none;">🌼</div>

    <div class="wi-grid">
      <button class="wi-card g1">
        <div class="card-top">
          <span class="new-badge">NEW</span>
          <span class="card-num">1</span>
          <span class="card-icon">🫧</span>
        </div>
        <div class="card-bottom">
          <div class="card-name">シャボンだまポン</div>
          <div class="card-desc">とんでくる たまを<br>タップしてわろう！</div>
          <div class="card-stars">⭐⭐⭐⭐⭐</div>
        </div>
      </button>
      <button class="wi-card g2">
        <div class="card-top">
          <span class="card-num">2</span>
          <span class="card-icon">🍎</span>
        </div>
        <div class="card-bottom">
          <div class="card-name">くだものキャッチ</div>
          <div class="card-desc">おちてくる くだものを<br>つかまえよう！</div>
          <div class="card-stars">⭐⭐⭐⭐</div>
        </div>
      </button>
      <button class="wi-card g3">
        <div class="card-top">
          <span class="card-num">3</span>
          <span class="card-icon">🌀</span>
        </div>
        <div class="card-bottom">
          <div class="card-name">めいろあそび</div>
          <div class="card-desc">ゴールをめざして<br>すすもう！</div>
          <div class="card-stars">⭐⭐⭐</div>
        </div>
      </button>
      <button class="wi-card g4">
        <div class="card-top">
          <span class="card-num">4</span>
          <span class="card-icon">🐾</span>
        </div>
        <div class="card-bottom">
          <div class="card-name">どうぶつパズル</div>
          <div class="card-desc">おなじどうぶつを<br>みつけよう！</div>
          <div class="card-stars">⭐⭐⭐⭐</div>
        </div>
      </button>
      <button class="wi-card g5">
        <div class="card-top">
          <span class="card-num">5</span>
          <span class="card-icon">🔢</span>
        </div>
        <div class="card-bottom">
          <div class="card-name">かずあそび</div>
          <div class="card-desc">かずとおなじだけ<br>タップしよう！</div>
          <div class="card-stars">⭐⭐⭐⭐</div>
        </div>
      </button>
      <button class="wi-card g6">
        <div class="card-top">
          <span class="new-badge">NEW</span>
          <span class="card-num">6</span>
          <span class="card-icon">⚽</span>
        </div>
        <div class="card-bottom">
          <div class="card-name">どうぶつサッカー</div>
          <div class="card-desc">タッチした方向に<br>シュート！</div>
          <div class="card-stars">⭐⭐⭐⭐⭐</div>
        </div>
      </button>
    </div>

    <!-- フッター動物パレード -->
    <div class="footer-charas">
      <span style="font-size:26px;">🦁</span>
      <span style="font-size:26px;">🦊</span>
      <span style="font-size:26px;">🐘</span>
      <span style="font-size:26px;">🐧</span>
      <span style="font-size:26px;">🐨</span>
      <span style="font-size:26px;">🐸</span>
      <span style="font-size:26px;">🐥</span>
      <span style="font-size:26px;">🦝</span>
    </div>

    <div class="wi-footer">🌟 あそびたいゲームをえらんでね 🌟</div>
  </div>
</div>
</body>
</html>
